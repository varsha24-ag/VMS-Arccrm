  <rect x="80" y="100" width="80" height="8" rx="4" fill="white" fill-opacity="0.1"/>
  
  <!-- Modern Visitor Badge -->
  <g transform="translate(140, 60)">
    <rect width="180" height="220" rx="16" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.2" stroke-width="2"/>
    <rect x="15" y="15" width="150" height="190" rx="12" fill="white" fill-opacity="0.05"/>
    
    <!-- Badge Profile Placeholder -->
    <circle cx="90" cy="75" r="35" fill="#e9774b" fill-opacity="0.2"/>
    <circle cx="90" cy="70" r="15" fill="#e9774b"/>
    <path d="M60 110C60 95 73.4315 90 90 90C106.569 90 120 95 120 110" stroke="#e9774b" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Badge Details -->
